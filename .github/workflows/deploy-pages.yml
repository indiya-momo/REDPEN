name: Deploy to GitHub Pages

# dist만 gh-pages 브랜치에 올립니다. 저장소 루트(main) 소스가 배포되면 /src/main.jsx 만 보이고 앱이 깨집니다.
# Settings → Pages → Build and deployment → Deploy from a branch → Branch: gh-pages / Folder: / (root)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /REDPEN/
          VITE_FEEDBACK_FORM_VIEW_URL: https://forms.gle/f6FpybKZHC5yAR817
          VITE_FEEDBACK_FORM_ACTION_URL: https://docs.google.com/forms/d/e/1FAIpQLSchUzVmBmu1zGiFH_tPDmiv0mY6C6oq-Y4ZxjCiU-oAoE5WPA/formResponse
          VITE_FEEDBACK_FORM_ENTRY_INCONVENIENT: entry.2074090186
          VITE_FEEDBACK_FORM_ENTRY_CONVENIENT: entry.944707313

      - name: Verify dist (not dev index)
        shell: bash
        run: |
          grep -q '/REDPEN/assets/' dist/index.html
          ! grep -q '/src/main.jsx' dist/index.html

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
