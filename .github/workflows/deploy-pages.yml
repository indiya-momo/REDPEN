name: Deploy to GitHub Pages

# 빌드 결과(dist)를 docs/ 에 커밋합니다. 브랜치는 main 만 사용합니다.
# GitHub Settings → Pages → Branch: main · Folder: /docs  (/(root) 아님!)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test and validate data JSON
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /REDPEN/
          VITE_UI_BUILD_ID: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.run_started_at }}
          VITE_FEEDBACK_FORM_VIEW_URL: https://forms.gle/f6FpybKZHC5yAR817
          VITE_FEEDBACK_FORM_ACTION_URL: https://docs.google.com/forms/d/e/1FAIpQLSchUzVmBmu1zGiFH_tPDmiv0mY6C6oq-Y4ZxjCiU-oAoE5WPA/formResponse
          VITE_FEEDBACK_FORM_ENTRY_INCONVENIENT: entry.2074090186
          VITE_FEEDBACK_FORM_ENTRY_CONVENIENT: entry.944707313
          VITE_FEATURE_SPELLING_EXPORT: 'true'
          VITE_FEATURE_LOANWORD_CONVERTER: 'true'
          VITE_BETA_QUOTA_ADMIN_EMAILS: wakano1017@gmail.com
          VITE_BETA_QUOTA_ADMIN_UIDS: sRAczpH8p3YpFOKKmZhJNLxL5Vh1
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}

      - name: Verify dist (not dev index)
        shell: bash
        run: |
          grep -q '/REDPEN/assets/' dist/index.html
          ! grep -q '/src/main.jsx' dist/index.html

      - name: Publish dist to docs/
        shell: bash
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Commit and push docs/
        env:
          HUSKY: 0
          SKIP_VERSION_BUMP: 1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A docs/
          git diff --staged --quiet && echo "No docs changes" && exit 0
          git commit -m "chore(pages): deploy built app to docs/"
          # detached HEAD·동시 push 대비: main 브랜치로 명시 push
          git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
