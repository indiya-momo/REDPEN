<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>인디야 — 인크루트용 이미지</title>
    <style>
      body {
        margin: 1.5rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #222;
        background: #f6f3ee;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
      }
      figure {
        margin: 1.25rem 0 2rem;
        max-width: 720px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ccc;
      }
      code {
        font-size: 0.85rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>인크루트 게시용 이미지 (앱 메뉴에 링크 없음)</h1>
    <figure>
      <img src="./incruit.jpg" alt="인디야 소개" width="640" />
    </figure>
    <p><code>/incruit/incruit.jpg</code></p>
  </body>
</html>
