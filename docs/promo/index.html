<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>인디야 — 게시판용 이미지</title>
    <style>
      body {
        margin: 1.5rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #222;
        background: #f6f3ee;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
      }
      p {
        max-width: 40rem;
        color: #444;
      }
      figure {
        margin: 1.25rem 0 2rem;
        max-width: 720px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #ccc;
      }
      figcaption {
        margin-top: 0.35rem;
        font-size: 0.85rem;
        color: #666;
      }
      code {
        font-size: 0.85rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>게시판용 이미지 (앱 메뉴에 링크 없음)</h1>
    <p>
      외부 게시판 HTML <code>&lt;img&gt;</code> 전용입니다. 검색·대문에서 연결하지
      않습니다.
    </p>

    <figure>
      <img src="./welcome-screen.png" alt="인디야 대문 화면" width="640" />
      <figcaption>welcome-screen.png</figcaption>
    </figure>
    <p><code>/promo/welcome-screen.png</code></p>

    <figure>
      <img src="./inspect-screen.png" alt="인디야 검수 화면" width="640" />
      <figcaption>inspect-screen.png</figcaption>
    </figure>
    <p><code>/promo/inspect-screen.png</code></p>
  </body>
</html>
