  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--cream:#ecd6a6;--padx:44px;}
  html,body{background:radial-gradient(120% 80% at 50% 0%,#241a14,#15110d 70%);color:#e0d6c8;font-family:-apple-system,system-ui,'Pretendard',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .page{max-width:1240px;height:100vh;margin:0 auto;padding:36px var(--padx) 14px;display:flex;flex-direction:column;gap:18px;}

  /* ── 히어로: 좌(텍스트) / 우(모모, 오른쪽 끝 정렬) ── */
  .hero{display:grid;grid-template-columns:1fr auto;gap:50px;align-items:center;}

  .left{display:flex;flex-direction:column;align-items:flex-start;text-align:left;gap:14px;min-width:0;}
  .brand{display:flex;align-items:baseline;gap:13px;}
  .logo{font-family:'Gugi',serif;font-size:44px;color:#f0e6d4;letter-spacing:2px;line-height:1;}
  .slogan{font-family:'Gowun Batang',serif;font-style:italic;font-size:18px;color:#a4937f;}
  .desc{display:flex;flex-direction:column;gap:3px;}
  .desc p{font-size:13px;color:#c2b6a0;display:flex;align-items:center;gap:7px;}
  .ic{width:16px;height:16px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex:none;color:#fff;}
  .ic.ok{background:#5fae6a;} .ic.no{background:#c4544e;}

  .ph{position:relative;font-family:'GanaChocolate',sans-serif;margin:2px 0;}
  .l1{color:#fff;font-size:22px;margin-bottom:6px;-webkit-text-stroke:1.5px #2c1d12;paint-order:stroke fill;text-shadow:0 2px 5px rgba(0,0,0,.5);}
  .l2{white-space:nowrap;font-size:38px;color:var(--cream);-webkit-text-stroke:5px #34230f;paint-order:stroke fill;text-shadow:0 4px 0 rgba(40,26,12,.45),0 11px 20px rgba(0,0,0,.55);}
  .u{position:relative;}
  .u::after{content:'';position:absolute;left:-2px;right:-2px;bottom:2px;height:5px;background:linear-gradient(180deg,#f6c24f,#df9b2e);}
  .anc{position:relative;} .spk{position:absolute;pointer-events:none;}
  .a-left .big{left:-26px;top:-8px;width:22px;color:#f6efe0;}
  .a-left .sm{left:-15px;top:20px;width:13px;color:#e9dcc2;opacity:.85;}
  .a-right .big{right:-26px;top:-8px;width:22px;color:#f6efe0;}
  .a-right .sm{right:-15px;top:20px;width:13px;color:#e9dcc2;opacity:.85;}
  .a-cho .orange{right:-7px;top:-6px;width:20px;color:#f0a23c;}

  .beta{display:inline-flex;align-items:center;gap:9px;}
  .badge{font-size:11px;color:#f0d890;border:1px solid rgba(240,216,144,.5);background:rgba(240,216,144,.08);border-radius:999px;padding:3px 11px;font-weight:600;}
  .quota{font-size:12.5px;color:#9a8d76;} .quota b{color:#f0d890;font-weight:600;}
  .cta{margin-top:4px;width:330px;padding:14px 22px;border-radius:13px;font-family:'Gowun Batang',serif;font-weight:700;font-size:24px;letter-spacing:3px;color:#f6ead4;text-align:center;
    background:linear-gradient(180deg,#d83f5c,#a8284a);border:1px solid #e76d85;cursor:pointer;
    box-shadow:0 8px 26px rgba(168,40,74,.5),0 0 22px rgba(216,63,92,.28),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .15s;}
  .cta:hover{transform:translateY(-2px);}

  /* 오른쪽 모모: 정사각 트림 액자, 오른쪽 끝이 아래 검수후 카드와 일치 */
  .right{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .bubble{position:relative;background:#f4ecdc;color:#3a2c1a;font-size:12.5px;font-weight:600;padding:7px 15px;border-radius:13px;box-shadow:0 4px 12px rgba(0,0,0,.4);white-space:nowrap;}
  .bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#f4ecdc;border-bottom:0;}
  .frame{width:332px;}
  .frame img{width:100%;height:auto;display:block;}

  /* ── 비포/애프터 (풀폭) ── */
  .ba{flex:1;min-height:0;display:grid;grid-template-columns:1fr 40px 1fr;gap:10px;align-items:stretch;}
  .card{position:relative;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#3a2c1c,#241a12);border:1px solid rgba(255,240,200,.12);display:flex;align-items:center;justify-content:center;color:#8a7757;font-family:'Gowun Batang',serif;font-style:italic;font-size:14px;}
  .card.after{border-color:rgba(232,200,120,.45);box-shadow:0 0 18px rgba(184,148,62,.16);}
  .tape{position:absolute;top:-10px;right:20px;font-weight:800;font-size:14px;color:#fff;padding:5px 15px;border-radius:3px;box-shadow:0 3px 8px rgba(0,0,0,.4);}
  .tape.before{background:#e58a8a;transform:rotate(3deg);} .tape.after{background:#5bb5b0;transform:rotate(-3deg);}
  .arrow{display:flex;align-items:center;justify-content:center;}
  .arrow .c{width:38px;height:38px;border-radius:50%;border:2px solid #5a4c34;display:flex;align-items:center;justify-content:center;color:#cba14e;font-size:19px;}
  .fold-cap{font-size:11px;color:#6f6453;text-align:center;}
</style>
